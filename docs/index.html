<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>フィジカルAI事例集</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="passcode-gate" id="passcode-gate">
    <form class="passcode-box" id="passcode-form">
      <p class="passcode-title">パスコードを入力してください</p>
      <input type="password" id="passcode-input" class="passcode-input" autocomplete="off" inputmode="numeric" placeholder="パスコード">
      <button type="submit" class="btn btn-primary">開く</button>
      <p class="passcode-error" id="passcode-error" hidden>パスコードが違います</p>
    </form>
  </div>
  <script>
  (function() {
    var GATE_KEY = 'paicase_auth_ok';
    var PASSCODE_HASH = 'a89879152a0418eaa00b25eb33278cfa3d866e92e2c8ff0ac2f3395452549bc6';
    var gate = document.getElementById('passcode-gate');
    var form = document.getElementById('passcode-form');
    var input = document.getElementById('passcode-input');
    var errorEl = document.getElementById('passcode-error');

    function sha256Hex(text) {
      var buf = new TextEncoder().encode(text);
      return crypto.subtle.digest('SHA-256', buf).then(function(hashBuf) {
        return Array.from(new Uint8Array(hashBuf)).map(function(b) {
          return b.toString(16).padStart(2, '0');
        }).join('');
      });
    }

    if (sessionStorage.getItem(GATE_KEY) === '1') {
      gate.remove();
    } else {
      input.focus();
      form.addEventListener('submit', function(e) {
        e.preventDefault();
        sha256Hex(input.value.trim()).then(function(hash) {
          if (hash === PASSCODE_HASH) {
            sessionStorage.setItem(GATE_KEY, '1');
            gate.remove();
          } else {
            errorEl.hidden = false;
            input.value = '';
            input.focus();
          }
        });
      });
    }
  })();
  </script>

  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <span class="brand-mark">◉</span>
        <div>
          <h1>フィジカルAI事例集</h1>
        </div>
      </div>
    </div>
  </header>



  <main class="container">
    <section class="panel">
      <div class="panel-header">
        <button class="collapse-toggle" id="phase-toggle" aria-expanded="false" aria-controls="phase-chips">
          <span class="collapse-arrow">▼</span>
          <h2>フェーズ</h2>
        </button>
      </div>
      <div id="phase-chips" class="vendor-chips collapsible-content" hidden></div>
    </section>

    <section class="panel">
      <div class="panel-header">
        <button class="collapse-toggle" id="matrix-toggle" aria-expanded="false" aria-controls="matrix-content">
          <span class="collapse-arrow">▼</span>
          <h2>業種 × ユースケース</h2>
        </button>
        <button id="clear-filter-btn" class="btn btn-ghost" hidden>絞り込み解除</button>
      </div>
      <div class="matrix-scroll collapsible-content" id="matrix-content" hidden>
        <table id="matrix-table" class="matrix-table"></table>
      </div>
    </section>

    <section class="panel">
      <div class="panel-header">
        <button class="collapse-toggle" id="vendor-toggle" aria-expanded="false" aria-controls="vendor-chips">
          <span class="collapse-arrow">▼</span>
          <h2>ベンダー</h2>
        </button>
      </div>
      <div id="vendor-chips" class="vendor-chips collapsible-content" hidden></div>
    </section>

    <section class="panel">
      <div class="panel-header">
        <button class="collapse-toggle" id="country-toggle" aria-expanded="false" aria-controls="country-chips">
          <span class="collapse-arrow">▼</span>
          <h2>国</h2>
        </button>
      </div>
      <div id="country-chips" class="vendor-chips collapsible-content" hidden></div>
    </section>

    <section class="panel">
      <div class="panel-header">
        <button class="collapse-toggle" id="robot-type-toggle" aria-expanded="false" aria-controls="robot-type-chips">
          <span class="collapse-arrow">▼</span>
          <h2>ロボットタイプ</h2>
        </button>
      </div>
      <div id="robot-type-chips" class="vendor-chips collapsible-content" hidden></div>
    </section>

    <section class="panel">
      <div class="panel-header">
        <h2>事例一覧</h2>
        <span id="filter-label" class="filter-label"></span>
        <span id="list-count" class="list-count"></span>
      </div>
      <div id="case-list" class="case-list"></div>
    </section>
  </main>

  <footer class="site-footer">
    <p>掲載事例の著作権・情報の正確性は各配信元に帰属します。詳細は各ソースサイトをご確認ください。</p>
  </footer>

  <!-- 詳細モーダル -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <button class="modal-close" id="modal-close" aria-label="閉じる">&times;</button>
      <div class="modal-image-wrap" id="modal-image-wrap"></div>
      <div class="modal-body">
        <div class="modal-tags" id="modal-tags"></div>
        <h2 class="modal-title" id="modal-title"></h2>
        <div class="modal-meta">
          <span id="modal-source"></span>
          <span class="dot">・</span>
          <span id="modal-date"></span>
        </div>
        <div class="modal-section">
          <h3>サマリー</h3>
          <p id="modal-summary"></p>
        </div>
        <button id="modal-detail-btn" class="btn btn-primary">詳細表示 ↗</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
